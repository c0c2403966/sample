<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sample Page</title>
    <style>
        body {
            text-align: center;
        }

        h1 {
            color: darkred;
        }

        p {
            text-align: left;
            border: 1px solid gray;
            padding: 15px;
        }

        iframe {
            display: block;
            margin: 30px auto;
        }

        img {
            display: block;
            margin: 30px auto;
            width: 500px;
        }
    </style>
</head>
<body>

    <h1>Hello, World!</h1>

    <p>This is a paragraph.</p>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/oyWBZDSuAoE" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>

    <img src="sample.jpg" alt="sample image">

</body>
</html>
